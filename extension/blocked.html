<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Blocked</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0b1020;
        color: #e2e8f0;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      .card {
        width: min(560px, calc(100vw - 32px));
        padding: 28px;
        border-radius: 16px;
        background: rgba(15, 23, 42, 0.9);
        border: 1px solid rgba(148, 163, 184, 0.22);
        box-shadow: 0 20px 45px rgba(2, 6, 23, 0.35);
      }
      h1 {
        margin: 0;
        font-size: 28px;
      }
      .line {
        margin: 0;
        font-size: 16px;
        color: #cbd5e1;
        line-height: 1.5;
      }
      .word {
        color: #fda4af;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <p class="line">Can’t access this page — flagged restricted word: <span class="word" id="word">(unknown)</span></p>
    </main>

    <script>
      const LAST_BLOCKED_KEY = "ibrowse:lastBlocked";

      async function renderBlockedWord() {
        const params = new URLSearchParams(window.location.search);
        const queryWord = params.get("word");
        const queryTabId = Number(params.get("tabId"));

        if (queryWord) {
          document.getElementById("word").textContent = queryWord;
          return;
        }

        try {
          const result = await chrome.storage.local.get([LAST_BLOCKED_KEY]);
          const lastBlocked = result[LAST_BLOCKED_KEY];
          const isSameTab = Number.isFinite(queryTabId) ? Number(lastBlocked?.tabId) === queryTabId : true;
          const fallbackWord = isSameTab ? lastBlocked?.word : null;
          document.getElementById("word").textContent = fallbackWord || "(unknown)";
        } catch (e) {
          document.getElementById("word").textContent = "(unknown)";
        }
      }

      renderBlockedWord();
    </script>
  </body>
</html>
