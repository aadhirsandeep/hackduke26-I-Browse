<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>I Browse</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: 'Space Grotesk', system-ui, sans-serif;
        background: #080810;
        color: #e2e8f0;
        height: 100vh;
        overflow: hidden;
      }

      #root { height: 100vh; }

      @keyframes orb-pulse {
        0%, 100% { transform: scale(1); opacity: 0.15; }
        50% { transform: scale(1.15); opacity: 0.25; }
      }

      @keyframes dot-pulse {
        0%, 100% { opacity: 1; box-shadow: 0 0 4px #06b6d4; }
        50% { opacity: 0.4; box-shadow: 0 0 12px #06b6d4; }
      }

      @keyframes fade-up {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @keyframes shimmer {
        0% { background-position: -200% center; }
        100% { background-position: 200% center; }
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      @keyframes status-in {
        from { opacity: 0; transform: translateY(4px) scale(0.97); }
        to { opacity: 1; transform: translateY(0) scale(1); }
      }

      .orb {
        position: fixed;
        top: -80px;
        right: -80px;
        width: 280px;
        height: 280px;
        border-radius: 50%;
        background: radial-gradient(circle, #6366f1 0%, #8b5cf6 40%, transparent 70%);
        animation: orb-pulse 4s ease-in-out infinite;
        pointer-events: none;
        z-index: 0;
      }

      .orb2 {
        position: fixed;
        bottom: -60px;
        left: -60px;
        width: 200px;
        height: 200px;
        border-radius: 50%;
        background: radial-gradient(circle, #06b6d4 0%, #0891b2 40%, transparent 70%);
        animation: orb-pulse 5s ease-in-out infinite reverse;
        pointer-events: none;
        z-index: 0;
        opacity: 0.1;
      }

      .live-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #06b6d4;
        animation: dot-pulse 2s ease-in-out infinite;
        flex-shrink: 0;
      }

      textarea:focus {
        outline: none;
        border-color: #8b5cf6 !important;
        box-shadow: 0 0 0 3px rgba(139,92,246,0.15), 0 0 20px rgba(139,92,246,0.1) !important;
      }

      textarea::placeholder { color: #475569; }

      .transform-btn {
        position: relative;
        overflow: hidden;
        width: 100%;
        padding: 13px 20px;
        background: linear-gradient(135deg, #6366f1, #8b5cf6, #06b6d4);
        background-size: 200% auto;
        color: #fff;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        font-weight: 600;
        font-size: 15px;
        font-family: 'Space Grotesk', sans-serif;
        letter-spacing: 0.3px;
        transition: background-position 0.4s ease, box-shadow 0.2s ease, transform 0.1s ease;
        box-shadow: 0 4px 24px rgba(99,102,241,0.3);
      }

      .transform-btn:hover:not(:disabled) {
        background-position: right center;
        box-shadow: 0 6px 32px rgba(139,92,246,0.5);
        transform: translateY(-1px);
      }

      .transform-btn:active:not(:disabled) {
        transform: translateY(0px);
      }

      .transform-btn:disabled {
        background: linear-gradient(135deg, #312e81, #4c1d95, #164e63);
        box-shadow: none;
        cursor: not-allowed;
        opacity: 0.6;
      }

      .transform-btn::after {
        content: '';
        position: absolute;
        top: 0; left: -100%;
        width: 60%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
        transition: left 0.5s ease;
      }

      .transform-btn:hover:not(:disabled)::after {
        left: 150%;
      }

      .spinner {
        display: inline-block;
        width: 14px;
        height: 14px;
        border: 2px solid rgba(255,255,255,0.3);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        vertical-align: middle;
        margin-right: 8px;
      }

      .status-badge {
        animation: status-in 0.3s ease forwards;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 14px;
        border-radius: 10px;
        font-size: 13px;
        font-weight: 500;
      }

      .status-badge.success {
        background: rgba(16,185,129,0.1);
        border: 1px solid rgba(16,185,129,0.25);
        color: #6ee7b7;
        box-shadow: 0 0 16px rgba(16,185,129,0.08);
      }

      .status-badge.error {
        background: rgba(239,68,68,0.08);
        border: 1px solid rgba(239,68,68,0.2);
        color: #fca5a5;
        box-shadow: 0 0 16px rgba(239,68,68,0.08);
      }

      .log-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        cursor: pointer;
        padding: 8px 12px;
        border-radius: 8px 8px 0 0;
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,255,255,0.07);
        border-bottom: none;
        user-select: none;
        transition: background 0.2s;
      }

      .log-header:hover { background: rgba(255,255,255,0.05); }

      .log-box {
        background: rgba(2,6,23,0.8);
        border: 1px solid rgba(255,255,255,0.07);
        border-top: none;
        border-radius: 0 0 8px 8px;
        padding: 12px;
        overflow-y: auto;
        font-size: 11.5px;
        font-family: 'JetBrains Mono', 'Fira Code', monospace;
        white-space: pre-wrap;
        word-break: break-all;
        color: #67e8f9;
        max-height: 220px;
        line-height: 1.6;
      }

      .log-box::-webkit-scrollbar { width: 4px; }
      .log-box::-webkit-scrollbar-track { background: transparent; }
      .log-box::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }

      .divider {
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(139,92,246,0.3), transparent);
        margin: 2px 0;
      }

      .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        padding: 20px 16px 16px;
        gap: 14px;
        position: relative;
        z-index: 1;
        animation: fade-up 0.4s ease forwards;
      }
    </style>
    <script type="module" crossorigin src="./assets/index-auth0.js"></script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
